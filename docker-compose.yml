version: '3.8'

services:
    backend:
        build: ./backend
        container_name: devforge-backend
        ports:
            - '8000:8000'
        environment:
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - DATABASE_URL=sqlite:///./devforge.db
            - DEBUG=True
            - PROJECTS_DIR=/app/generated_projects
        volumes:
            - ./backend:/app
            - ./generated_projects:/app/generated_projects
        restart: unless-stopped
        networks:
            - devforge-network

    frontend:
        build: ./frontend
        container_name: devforge-frontend
        ports:
            - '3000:3000'
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:8000
        depends_on:
            - backend
        restart: unless-stopped
        networks:
            - devforge-network

networks:
    devforge-network:
        driver: bridge

volumes:
    generated_projects:
